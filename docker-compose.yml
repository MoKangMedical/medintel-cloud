version: "3.9"

services:
  # ========== 基础设施 ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medintel
      POSTGRES_USER: medintel
      POSTGRES_PASSWORD: medintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ========== API Gateway ==========
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: uvicorn core.gateway.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://medintel:medintel@postgres:5432/medintel
      - REDIS_URL=redis://redis:6379/0
      - MIMO_API_KEY=${MIMO_API_KEY:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  # ========== 药物发现引擎 ==========
  medi-pharma:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: python -m services.drug_discovery.medi_pharma.service
    environment:
      - DATABASE_URL=postgresql+asyncpg://medintel:medintel@postgres:5432/medintel
      - MIMO_API_KEY=${MIMO_API_KEY:-}
    depends_on:
      - postgres

  drugmind:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: python -m services.drug_discovery.drugmind.service
    environment:
      - DATABASE_URL=postgresql+asyncpg://medintel:medintel@postgres:5432/medintel
      - MIMO_API_KEY=${MIMO_API_KEY:-}
